name: Docker Build

on:
  workflow_call:
    secrets:
      TENCENT_REGISTRY_USERNAME:
        required: true
      TENCENT_REGISTRY_PASSWORD:
        required: true
    outputs:
      image-tags:
        description: "Docker image tags"
        value: ${{ jobs.build.outputs.tags }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com
  TENCENT_IMAGE_NAME: gdgeek/editor

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Tencent Registry availability
        id: tencent-check
        shell: bash
        run: |
          set +e

          # Missing credentials: skip Tencent push without failing workflow.
          if [ -z "${{ secrets.TENCENT_REGISTRY_USERNAME }}" ] || [ -z "${{ secrets.TENCENT_REGISTRY_PASSWORD }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tencent registry credentials are missing, skip Tencent push."
            exit 0
          fi

          if curl -fsS --connect-timeout 6 --max-time 12 "https://${{ env.TENCENT_REGISTRY }}/v2/" >/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tencent registry is unreachable, skip Tencent push in this run."
          fi

      - name: Login to Tencent Cloud Container Registry
        if: steps.tencent-check.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Extract metadata for GitHub Registry
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Extract metadata for Tencent Registry
        id: meta-tencent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TENCENT_REGISTRY }}/${{ env.TENCENT_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Generate build time
        id: build-time
        run: echo "time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Build and push to GitHub Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_TIME=${{ steps.build-time.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Tencent Registry
        if: steps.tencent-check.outputs.available == 'true'
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-tencent.outputs.tags }}
          labels: ${{ steps.meta-tencent.outputs.labels }}
          build-args: BUILD_TIME=${{ steps.build-time.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
